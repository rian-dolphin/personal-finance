# Run hooks with: prek run --all-files   (install: prek install)
# Hooks use the uv-managed ruff/ty so versions stay pinned in uv.lock.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
